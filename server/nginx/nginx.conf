server {
    listen 443 ssl;
    server_name nexus-rbngza.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/nexus-rbngza.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus-rbngza.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Required for SSE — disable all buffering
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Keep SSE connections alive for up to 24 h
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
